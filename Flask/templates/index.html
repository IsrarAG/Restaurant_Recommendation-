<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vellore & Vine | Epicurean Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,400&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #0a0a0a; color: #f2f2f2; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        .accent { color: #c5a059; }
        .grain { position: fixed; inset: 0; opacity: 0.04; pointer-events: none; z-index: 50; background: url('https://grainy-gradients.vercel.app/noise.svg'); }
    </style>
</head>
<body class="overflow-x-hidden">
    <div class="grain"></div>
    <nav class="p-10 flex justify-between items-center max-w-7xl mx-auto w-full relative z-10">
        <div class="serif text-3xl italic tracking-widest uppercase">Vellore <span class="not-italic font-bold accent">&</span> Vine</div>
        <a href="/web" class="text-[10px] uppercase tracking-[0.5em] font-bold accent border-b border-[#c5a059]">Enter Studio</a>
    </nav>

    <main class="max-w-7xl mx-auto px-10 py-20 grid lg:grid-cols-2 gap-20 items-center relative z-10">
        <div class="space-y-10">
            <h1 class="serif text-8xl md:text-9xl leading-[0.85] text-white">The <br>Neural <span class="italic accent">Palate.</span></h1>
            <p class="text-xl text-gray-500 font-light leading-relaxed max-w-md">Decoding sensory signatures through algorithmic precision. Welcome to the future of dining.</p>
            <a href="/web" class="inline-block bg-[#c5a059] text-black px-12 py-5 text-[10px] font-bold uppercase tracking-[0.4em]">Initialize Mapping</a>
        </div>
        <div class="relative bg-[#111] rounded-sm overflow-hidden">
            <img src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&q=80&w=1200" 
                 class="w-full h-[700px] object-cover grayscale opacity-60 transition-opacity duration-1000" 
                 onload="this.style.opacity='0.6'" onerror="this.src='https://via.placeholder.com/1200x700/111/c5a059?text=Sensory+Mapping'">
        </div>
    </main>
</body>
</html>
