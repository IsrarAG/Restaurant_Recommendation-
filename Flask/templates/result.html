<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dossier | Vellore & Vine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #fafaf9; color: #1a1a1a; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        .dossier-table { width: 100%; text-align: left; }
        .dossier-table th { @apply uppercase text-[9px] tracking-widest text-gray-400 border-b pb-4; }
        .dossier-table td { @apply py-6 serif italic text-2xl border-b border-gray-100; }
        .chart-container { @apply bg-white p-8 border border-gray-100 shadow-sm; }
    </style>
</head>
<body class="p-10">
    <header class="max-w-7xl mx-auto flex justify-between items-end mb-20">
        <div>
            <span class="text-[10px] font-bold uppercase tracking-widest text-[#c5a059]">Signature Results</span>
            <h1 class="serif text-7xl italic mt-2">The Selection.</h1>
        </div>
        <p class="serif text-3xl text-[#c5a059] italic">{{ search_term }}</p>
    </header>

    <main class="max-w-7xl mx-auto grid lg:grid-cols-3 gap-16">
        <div class="lg:col-span-2 overflow-x-auto">{{ keyword | safe }}</div>
        <div class="space-y-10">
            <div class="chart-container">
                <h4 class="text-[10px] font-bold uppercase text-center mb-6 text-gray-400 tracking-widest">Palate Radar</h4>
                <canvas id="radarChart"></canvas>
            </div>
            <div class="chart-container">
                <h4 class="text-[10px] font-bold uppercase text-center mb-6 text-gray-400 tracking-widest">Cost Polar Map</h4>
                <canvas id="polarChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        const names = {{ names | safe }}.slice(0,5);
        const ratings = {{ ratings | safe }}.slice(0,5);
        const cost = {{ cost | safe }}.slice(0,5);

        new Chart(document.getElementById('radarChart'), {
            type: 'radar',
            data: { labels: names, datasets: [{ data: ratings, backgroundColor: 'rgba(197,160,89,0.1)', borderColor: '#c5a059', borderWidth: 1 }] },
            options: { plugins: { legend: { display: false } }, scales: { r: { ticks: { display: false } } } }
        });

        new Chart(document.getElementById('polarChart'), {
            type: 'polarArea',
            data: { labels: names, datasets: [{ data: cost, backgroundColor: ['#1a1a1a', '#c5a059', '#333', '#e5e5e5', '#888'] }] },
            options: { plugins: { legend: { display: false } }, scales: { r: { ticks: { display: false } } } }
        });
    </script>
</body>
</html>
